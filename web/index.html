<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>londo — the other london, in person</title>
  <meta name="theme-color" content="#14101f">
  <meta name="description" content="The other london, in person — gatherings that connect and inspire, from ecstatic dance to AI salons, breathwork to philosophy nights.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="londo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="grain"></div>
  </div>

  <header class="topbar">
    <div>
      <h1>londo</h1>
      <p class="tagline">the other london, in person</p>
    </div>
    <nav class="views" id="view-tabs" aria-label="views">
      <button class="key view-key lit" data-view="browse">browse</button>
      <button class="key view-key" data-view="tonight">tonight</button>
      <button class="key view-key" data-view="map">map</button>
    </nav>
  </header>

  <div class="controls" id="controls">
    <div class="controls-row">
      <input id="search" type="search" placeholder="search for something…" autocomplete="off">
      <div class="unit unit-inline">
        <label class="switch" title="free events only">
          <input type="checkbox" id="free-toggle">
          <span class="slider"></span>
        </label>
        <span class="legend">free only</span>
      </div>
      <button class="key reset-key" id="reset-filters" title="clear every filter">reset</button>
    </div>

    <div class="controls-row keys" id="category-pills" hidden>
      <button class="key cat-key lit" data-category="all">everything</button>
      <button class="key cat-key key-move" data-category="move">move</button>
      <button class="key cat-key key-connect" data-category="connect">connect</button>
      <button class="key cat-key key-expand" data-category="expand">expand</button>
      <button class="key cat-key key-think" data-category="think">think</button>
      <button class="key cat-key key-make" data-category="make">make</button>
    </div>

    <div class="controls-row bench">
      <div class="unit" id="lens-unit" hidden>
        <div class="drum" id="lens-drum" role="button" aria-label="tech lens" title="tap to flick">
          <div class="drum-tape" id="lens-tape">
            <div class="drum-row">&nbsp;</div>
            <div class="drum-row center">tech &amp; beyond</div>
            <div class="drum-row">tech only</div>
            <div class="drum-row">beyond tech</div>
            <div class="drum-row">&nbsp;</div>
          </div>
          <div class="drum-knurl"></div>
        </div>
        <span class="legend">lens</span>
      </div>

      <div class="unit" id="compass-unit" hidden>
        <div class="compass" id="compass" role="group" aria-label="london area">
          <button class="cbtn n" data-area="north" title="north">▲</button>
          <button class="cbtn s" data-area="south" title="south">▼</button>
          <button class="cbtn w" data-area="west" title="west">◀</button>
          <button class="cbtn e" data-area="east" title="east">▶</button>
          <button class="cbtn c" data-area="central" title="central">●</button>
        </div>
        <span class="legend">around · <b id="compass-readout">anywhere</b></span>
      </div>

      <div class="unit unit-grow">
        <div class="ticker" id="week-strip">
          <!-- day cells rendered from live data -->
        </div>
        <span class="legend">days</span>
      </div>
    </div>

    <div class="controls-row unit" id="topic-unit" hidden>
      <div class="tape" id="topic-chips">
        <!-- topic tokens rendered from live data -->
      </div>
      <span class="legend">about — pick a few</span>
    </div>
  </div>

  <main id="events"><p class="status">gathering events…</p></main>

  <section id="map-view" hidden>
    <div id="map"></div>
  </section>

  <section class="submit" id="submit-box">
    <p class="submit-prompt">know a gathering we don't?</p>
    <form id="submit-form">
      <input id="submit-url" type="url" required placeholder="paste an event link…" autocomplete="off">
      <button type="submit" class="key">send it in</button>
    </form>
    <p class="submit-note" id="submit-note" hidden></p>
  </section>

  <footer>
    <p id="last-updated" hidden></p>
    <p>stitched from
       <a href="https://dandelion.events">dandelion</a> ·
       <a href="https://luma.com/london">luma</a> ·
       <a href="https://newspeak.house/#events">newspeak house</a> ·
       eventbrite ·
       <a href="https://www.psycalendar.com">psycalendar</a> ·
       and the people of london</p>
  </footer>

  <nav class="bottom-tabs" id="bottom-tabs" aria-label="views">
    <button class="key view-key lit" data-view="browse">browse</button>
    <button class="key view-key" data-view="tonight">tonight</button>
    <button class="key view-key" data-view="map">map</button>
  </nav>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
