<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>londo — what's on, in between</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="grain"></div>
  </div>

  <header class="topbar">
    <h1>londo</h1>
    <p class="tagline">a calm little window onto London&rsquo;s gatherings</p>
  </header>

  <div class="controls">
    <div class="controls-row">
      <input id="search" type="search" placeholder="search for something…" autocomplete="off">
      <button class="pill" id="free-toggle">free only</button>
      <label class="select-wrap" for="range">
        <select id="range">
          <option value="today">today</option>
          <option value="week" selected>next 7 days</option>
          <option value="month">next 30 days</option>
          <option value="all">everything upcoming</option>
        </select>
        <svg class="chevron" viewBox="0 0 12 8" width="12" height="8" aria-hidden="true">
          <path d="M1 1.5 L6 6.5 L11 1.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </label>
    </div>
    <div class="controls-row pills scroll-row" id="source-pills">
      <button class="pill active" data-source="all">everywhere</button>
      <button class="pill" data-source="dandelion">dandelion</button>
      <button class="pill" data-source="luma">luma</button>
      <button class="pill" data-source="newspeak">newspeak house</button>
      <button class="pill" data-source="numinity">numinity</button>
      <button class="pill" data-source="eventbrite">eventbrite</button>
      <button class="pill" data-source="other">elsewhere</button>
    </div>
    <div class="controls-row tag-row scroll-row" id="tag-cloud" hidden>
      <span class="tag-label">popular:</span>
      <!-- tags rendered from live data -->
    </div>
  </div>

  <main id="events"><p class="status">gathering events…</p></main>

  <footer>
    <p>stitched nightly from
       <a href="https://dandelion.events">dandelion</a> ·
       <a href="https://luma.com/london">luma</a> ·
       <a href="https://newspeak.house/#events">newspeak house</a> ·
       <a href="https://www.eventbrite.co.uk/o/numinity-33797188771">numinity</a></p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
