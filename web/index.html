<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>londo — what's on, in between</title>
  <meta name="theme-color" content="#14101f">
  <meta name="description" content="In-person London gatherings that connect and inspire — ecstatic dance to AI salons, breathwork to philosophy nights.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="londo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="grain"></div>
  </div>

  <header class="topbar">
    <h1>londo</h1>
    <nav class="views" id="view-tabs" aria-label="views">
      <button class="view-tab active" data-view="browse">browse</button>
      <button class="view-tab" data-view="tonight">tonight</button>
      <button class="view-tab" data-view="map">map</button>
    </nav>
  </header>

  <div class="controls" id="controls">
    <div class="controls-row">
      <input id="search" type="search" placeholder="search for something…" autocomplete="off">
      <button class="pill" id="free-toggle">free only</button>
      <button class="pill lens" id="lens-toggle" data-lens="all" hidden>tech &amp; beyond</button>
    </div>
    <div class="controls-row pills" id="category-pills" hidden>
      <button class="pill active" data-category="all">everything</button>
      <button class="pill pill-move" data-category="move">move</button>
      <button class="pill pill-connect" data-category="connect">connect</button>
      <button class="pill pill-expand" data-category="expand">expand</button>
      <button class="pill pill-think" data-category="think">think</button>
      <button class="pill pill-make" data-category="make">make</button>
    </div>
    <div class="controls-row pills areas" id="area-chips" hidden>
      <span class="tag-label">around:</span>
      <button class="chip active" data-area="all">anywhere</button>
      <button class="chip" data-area="central">central</button>
      <button class="chip" data-area="east">east</button>
      <button class="chip" data-area="north">north</button>
      <button class="chip" data-area="south">south</button>
      <button class="chip" data-area="west">west</button>
    </div>
    <div class="controls-row week-strip" id="week-strip">
      <!-- day chips rendered from live data -->
    </div>
    <div class="controls-row pills topics" id="topic-chips" hidden>
      <span class="tag-label">about:</span>
      <!-- topic chips rendered from live data -->
    </div>
  </div>

  <main id="events"><p class="status">gathering events…</p></main>

  <section id="map-view" hidden>
    <div id="map"></div>
  </section>

  <section class="submit" id="submit-box">
    <p class="submit-prompt">know a gathering we don't?</p>
    <form id="submit-form">
      <input id="submit-url" type="url" required placeholder="paste an event link…" autocomplete="off">
      <button type="submit" class="pill">send it in</button>
    </form>
    <p class="submit-note" id="submit-note" hidden></p>
  </section>

  <footer>
    <p id="last-updated" hidden></p>
    <p>stitched from
       <a href="https://dandelion.events">dandelion</a> ·
       <a href="https://luma.com/london">luma</a> ·
       <a href="https://newspeak.house/#events">newspeak house</a> ·
       eventbrite ·
       <a href="https://www.psycalendar.com">psycalendar</a> ·
       and the people of london</p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
