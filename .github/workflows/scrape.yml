name: Daily scrape

on:
  schedule:
    # every 6 hours — Luma's feed gains events throughout the day
    - cron: "17 5,11,17,23 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Scrape, enrich and upsert
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: londo scrape --store supabase

      # Rebuild the static site (per-event SEO/OG pages) from fresh data
      - name: Build site
        run: python3 scripts/build_site.py build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # psyconnect: rebuilt from the fresh data and pushed to its own Pages repo
  deploy-psyconnect:
    needs: scrape
    runs-on: ubuntu-latest
    concurrency:
      group: psyconnect-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Build psyconnect
        run: python3 scripts/build_site.py --site psyconnect build-psyconnect
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PSYCONNECT_DEPLOY_KEY }}
          external_repository: adampluck/psyconnect
          publish_branch: gh-pages
          publish_dir: build-psyconnect
          force_orphan: true
          # keeps the custom-domain CNAME file across force-pushes
          cname: psyconnect.london
