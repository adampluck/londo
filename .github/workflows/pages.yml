name: Deploy frontend

on:
  push:
    branches: [main]
    paths: ["web/**", "sites/**", "scripts/build_site.py"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Static event/category pages are rebuilt from live data so a frontend
      # push doesn't wipe them (stdlib only — no installs needed)
      - name: Build site
        run: python3 scripts/build_site.py build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build
      - id: deployment
        uses: actions/deploy-pages@v4

  # psyconnect: same codebase, filtered dataset, pushed to its own Pages
  # repo (deploy key SSH — no GITHUB_TOKEN permissions involved)
  deploy-psyconnect:
    runs-on: ubuntu-latest
    concurrency:
      group: psyconnect-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Build psyconnect
        run: python3 scripts/build_site.py --site psyconnect build-psyconnect
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PSYCONNECT_DEPLOY_KEY }}
          external_repository: adampluck/psyconnect
          publish_branch: gh-pages
          publish_dir: build-psyconnect
          force_orphan: true
          # keeps the custom-domain CNAME file across force-pushes
          cname: psyconnect.london
